<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan QR Code</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-50 to-teal-100 min-h-screen">
  <div class="max-w-2xl mx-auto px-4 py-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-teal-700 mb-2">Check-in Scanner</h1>
      <p class="text-teal-600">Point your camera at the QR code</p>
    </div>
    <div class="bg-white rounded-lg shadow-lg p-6">
      <video id="video" class="w-full rounded-lg border-4 border-teal-500 mb-6"></video>
      <div id="result" class="text-center text-lg font-bold text-teal-700 min-h-12 flex items-center justify-center bg-teal-50 rounded-lg p-4">Waiting for QR code...</div>
    </div>
  </div>

  <script type="module" src="js/scan.js"></script>
</body>
</html>
