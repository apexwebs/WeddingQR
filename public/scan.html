<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Check-in Scanner | Wedding Check-in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1 { font-family: 'Playfair Display', serif; }
    .bg-cream { background-color: #fdfbf7; }
    .bg-emerald-deep { background-color: #064e3b; }
    .border-gold { border-color: #d4af37; }
    
    .scanner-container {
      position: relative;
      overflow: hidden;
    }
    
    .scanner-laser {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: #d4af37;
      box-shadow: 0 0 15px 2px rgba(212, 175, 55, 0.5);
      animation: scan 3s linear infinite;
      z-index: 10;
    }

    @keyframes scan {
      0% { top: 0; }
      50% { top: 100%; }
      100% { top: 0; }
    }
  </style>
</head>
<body class="bg-cream min-h-screen text-slate-800">
  <div class="max-w-2xl mx-auto px-6 py-12">
    <!-- Header -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center justify-center p-3 bg-emerald-50 rounded-full mb-4">
        <i data-lucide="scan-line" class="w-8 h-8 text-emerald-800"></i>
      </div>
      <h1 class="text-4xl font-bold text-emerald-900 mb-2 italic">Entry Scanner</h1>
      <p class="text-emerald-700/80 font-medium">Position the guest's QR code within the frame</p>
    </div>

    <!-- Scanner UI -->
    <div class="bg-white rounded-3xl shadow-xl border border-emerald-100 p-6 relative">
      <div class="scanner-container rounded-2xl border-4 border-emerald-900/5 aspect-video bg-black relative">
        <video id="video" class="w-full h-full object-cover rounded-xl"></video>
        <div class="scanner-laser"></div>
        
        <!-- Corner Accents -->
        <div class="absolute top-4 left-4 w-8 h-8 border-t-4 border-l-4 border-gold rounded-tl-lg"></div>
        <div class="absolute top-4 right-4 w-8 h-8 border-t-4 border-r-4 border-gold rounded-tr-lg"></div>
        <div class="absolute bottom-4 left-4 w-8 h-8 border-b-4 border-l-4 border-gold rounded-bl-lg"></div>
        <div class="absolute bottom-4 right-4 w-8 h-8 border-b-4 border-r-4 border-gold rounded-br-lg"></div>
      </div>

      <!-- Status Indicator -->
      <div id="result" class="mt-8 text-center py-4 px-6 bg-emerald-50 rounded-2xl border border-emerald-100 flex items-center justify-center gap-3">
        <i data-lucide="loader-2" class="w-5 h-5 text-emerald-600 animate-spin"></i>
        <span class="text-emerald-900 font-bold uppercase tracking-widest text-sm">Initializing Camera...</span>
      </div>
    </div>

    <!-- Actions -->
    <div class="mt-10 text-center">
      <a href="/" class="inline-flex items-center gap-2 text-emerald-800 hover:text-gold transition-colors font-bold group">
        <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
        Return to Dashboard
      </a>
    </div>
  </div>

  <script type="module" src="js/scan.js"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
