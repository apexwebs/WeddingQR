<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Management | Wedding Check-in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2, th { font-family: 'Playfair Display', serif; }
    .bg-cream { background-color: #fdfbf7; }
    .text-gold { color: #d4af37; }
    .bg-gold { background-color: #d4af37; }
    .border-gold { border-color: #d4af37; }
    .hover-gold:hover { background-color: #c5a028; transition: background-color 200ms ease-in-out; }
    .bg-emerald-deep { background-color: #064e3b; }
    .hover-emerald-deep:hover { background-color: #043e30; transition: background-color 200ms ease-in-out; }
    .cursor-pointer { cursor: pointer; }
  </style>
</head>
<body class="bg-cream min-h-screen text-slate-800">
  <div class="max-w-7xl mx-auto px-6 py-12">
    <!-- Header Section -->
    <div class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
      <div>
        <h1 class="text-5xl font-bold text-emerald-900 mb-2 italic">Guest List</h1>
        <p class="text-emerald-700/80 font-medium">Curate your attendee list and send invitations</p>
      </div>
      <a href="/" class="flex items-center gap-2 text-emerald-800 hover:text-gold transition-colors font-semibold group">
        <i data-lucide="arrow-left" class="w-5 h-5 group-hover:-translate-x-1 transition-transform"></i>
        Back to Dashboard
      </a>
    </div>

    <!-- Add Guest Form -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-8 mb-8">
      <h2 class="text-2xl font-bold text-emerald-900 mb-6 flex items-center gap-3 italic">
        <i data-lucide="user-plus" class="w-6 h-6 text-gold"></i>
        Invite a New Attendee
      </h2>
      <form id="addForm" class="grid md:grid-cols-12 gap-6 items-end">
        <div class="md:col-span-5">
          <label class="block text-sm font-semibold text-emerald-900/60 uppercase tracking-widest mb-2 px-1">Full Name</label>
          <input type="text" name="name" placeholder="E.g., Jane Smith" required class="w-full px-4 py-3 bg-cream/50 border border-emerald-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-gold/50 focus:border-gold transition-all" />
        </div>
        <div class="md:col-span-4">
          <label class="block text-sm font-semibold text-emerald-900/60 uppercase tracking-widest mb-2 px-1">WhatsApp Phone</label>
          <div class="flex">
            <span class="px-4 py-3 bg-emerald-50 border border-emerald-100 border-r-0 rounded-l-xl text-emerald-800 font-bold">+254</span>
            <input type="tel" name="phone" placeholder="712345678" required class="flex-1 px-4 py-3 bg-cream/50 border border-emerald-100 rounded-r-xl focus:outline-none focus:ring-2 focus:ring-gold/50 focus:border-gold transition-all" />
          </div>
        </div>
        <div class="md:col-span-3">
          <button class="w-full bg-emerald-deep text-white font-bold py-3.5 px-6 rounded-xl hover-emerald-deep cursor-pointer flex items-center justify-center gap-2 shadow-lg shadow-emerald-900/10 transition-all">
            <i data-lucide="plus" class="w-5 h-5"></i>
            Add Guest
          </button>
        </div>
      </form>
    </div>

    <!-- Bulk Actions Bar -->
    <div id="bulkActionsBar" class="mb-6 bg-white rounded-xl shadow-sm border border-gold/30 p-4 hidden">
      <div class="flex items-center gap-4">
        <span id="selectedCount" class="text-emerald-900 font-bold bg-gold/10 px-3 py-1 rounded-lg">0 selected</span>
        <div class="h-6 w-px bg-emerald-100"></div>
        <button id="bulkResetBtn" class="flex items-center gap-2 px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-bold transition-all cursor-pointer">
          <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reset Status
        </button>
        <button id="bulkDeleteBtn" class="flex items-center gap-2 px-4 py-2 bg-red-50 hover:bg-red-100 text-red-600 rounded-lg text-sm font-bold transition-all cursor-pointer">
          <i data-lucide="trash-2" class="w-4 h-4"></i> Delete Selected
        </button>
        <button id="clearSelectionBtn" class="ml-auto text-emerald-600 hover:text-emerald-900 text-sm font-bold transition-colors cursor-pointer">Clear Selection</button>
      </div>
    </div>

    <!-- Guest Table -->
    <div class="bg-white rounded-2xl shadow-sm border border-emerald-100 overflow-hidden">
      <div class="overflow-x-auto">
        <table id="guestTable" class="w-full text-left">
          <thead class="bg-emerald-deep text-white">
            <tr>
              <th class="px-6 py-5 text-center w-16">
                <input type="checkbox" id="selectAll" class="w-4 h-4 rounded border-emerald-700 text-gold focus:ring-gold cursor-pointer" />
              </th>
              <th class="px-6 py-5 font-bold uppercase tracking-wider text-sm italic">Attendee Name</th>
              <th class="px-6 py-5 font-bold uppercase tracking-wider text-sm italic">WhatsApp Contact</th>
              <th class="px-6 py-5 font-bold uppercase tracking-wider text-sm italic">Current Status</th>
              <th class="px-6 py-5 text-center font-bold uppercase tracking-wider text-sm italic">Management</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-emerald-50"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let allGuests = [];
    let selectedGuests = new Set();

    async function loadGuests() {
      try {
        const res = await fetch('/guests');
        allGuests = await res.json();
        renderTable();
      } catch (err) {
        console.error('Failed to load guests:', err);
      }
    }

    function renderTable() {
      const tbody = document.querySelector('#guestTable tbody');
      tbody.innerHTML = '';
      allGuests.forEach((g) => {
        const tr = document.createElement('tr');
        tr.className = selectedGuests.has(g.id) ? 'bg-gold/5' : 'bg-white hover:bg-emerald-50/50 transition-colors';
        
        const statusClass = g.checkedIn 
          ? 'bg-emerald-100 text-emerald-800' 
          : 'bg-slate-100 text-slate-600';
        const statusIcon = g.checkedIn ? 'check' : 'clock';
        const statusText = g.checkedIn ? 'Checked In' : 'Pending';
        
        tr.innerHTML = `
          <td class="px-6 py-4 text-center">
            <input type="checkbox" class="guest-checkbox w-4 h-4 rounded border-emerald-200 text-gold focus:ring-gold cursor-pointer" data-id="${g.id}" ${selectedGuests.has(g.id) ? 'checked' : ''} />
          </td>
          <td class="px-6 py-4">
            <div class="font-bold text-emerald-900">${g.name}</div>
          </td>
          <td class="px-6 py-4">
            <div class="flex items-center gap-2 text-slate-600 font-medium">
              <i data-lucide="phone" class="w-4 h-4 text-emerald-300"></i>
              +254 ${g.phone || '-'}
            </div>
          </td>
          <td class="px-6 py-4">
            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider ${statusClass}">
              <i data-lucide="${statusIcon}" class="w-3.5 h-3.5"></i>
              ${statusText}
            </span>
          </td>
          <td class="px-6 py-4 text-center">
            <div class="flex items-center justify-center gap-2">
              <a href="/guests/${g.id}/qr" target="_blank" title="View QR" class="p-2 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-lg transition-colors cursor-pointer">
                <i data-lucide="qr-code" class="w-4 h-4"></i>
              </a>
              <button class="send-whatsapp-btn p-2 bg-green-50 hover:bg-green-100 text-green-600 rounded-lg transition-colors cursor-pointer" data-id="${g.id}" title="Send Invitation">
                <i data-lucide="message-circle" class="w-4 h-4"></i>
              </button>
              <button class="reset-status-btn p-2 bg-slate-50 hover:bg-slate-100 text-slate-600 rounded-lg transition-colors cursor-pointer" data-id="${g.id}" title="Reset Status">
                <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
              </button>
              <button class="delete-btn p-2 bg-red-50 hover:bg-red-100 text-red-500 rounded-lg transition-colors cursor-pointer" data-id="${g.id}" title="Delete Guest">
                <i data-lucide="trash-2" class="w-4 h-4"></i>
              </button>
            </div>
          </td>
        `;
        tbody.appendChild(tr);

        // attach event listeners
        tr.querySelector('.send-whatsapp-btn').addEventListener('click', () => sendWhatsApp(g.id, g.name, g.phone));
        tr.querySelector('.reset-status-btn').addEventListener('click', () => resetStatus(g.id));
        tr.querySelector('.delete-btn').addEventListener('click', () => deleteGuest(g.id));
        tr.querySelector('.guest-checkbox').addEventListener('change', (e) => {
          if (e.target.checked) {
            selectedGuests.add(g.id);
          } else {
            selectedGuests.delete(g.id);
          }
          updateBulkUI();
        });
      });
      lucide.createIcons();
      updateBulkUI();
    }

    function updateBulkUI() {
      const bulkBar = document.getElementById('bulkActionsBar');
      const selectedCount = document.getElementById('selectedCount');
      const selectAllCheckbox = document.getElementById('selectAll');

      if (selectedGuests.size > 0) {
        bulkBar.classList.remove('hidden');
        selectedCount.textContent = `${selectedGuests.size} selected`;
      } else {
        bulkBar.classList.add('hidden');
      }

      selectAllCheckbox.checked = selectedGuests.size === allGuests.length && allGuests.length > 0;
    }

    document.getElementById('selectAll').addEventListener('change', (e) => {
      if (e.target.checked) {
        allGuests.forEach(g => selectedGuests.add(g.id));
      } else {
        selectedGuests.clear();
      }
      renderTable();
    });

    document.getElementById('bulkResetBtn').addEventListener('click', async () => {
      if (confirm(`Reset status for ${selectedGuests.size} guest(s)?`)) {
        for (const id of selectedGuests) {
          await fetch(`/guests/${id}/reset`, { method: 'POST' });
        }
        selectedGuests.clear();
        loadGuests();
      }
    });

    document.getElementById('bulkDeleteBtn').addEventListener('click', async () => {
      if (confirm(`Delete ${selectedGuests.size} guest(s)? This cannot be undone.`)) {
        for (const id of selectedGuests) {
          await fetch(`/guests/${id}`, { method: 'DELETE' });
        }
        selectedGuests.clear();
        loadGuests();
      }
    });

    document.getElementById('clearSelectionBtn').addEventListener('click', () => {
      selectedGuests.clear();
      renderTable();
    });

    async function sendWhatsApp(id, name, phone) {
      const viewUrl = `${location.origin}/guests/${id}/view`;
      const message = encodeURIComponent(`Hi ${name}! 👋 We are excited to have you. Open your check-in QR code here:\n${viewUrl}`);
      const whatsappUrl = `https://wa.me/254${phone}?text=${message}`;
      window.open(whatsappUrl, '_blank');
    }

    async function resetStatus(id) {
      if (confirm('Reset this guest\'s check-in status?')) {
        const res = await fetch(`/guests/${id}/reset`, { method: 'POST' });
        if (res.ok) loadGuests();
      }
    }

    async function deleteGuest(id) {
      if (confirm('Delete this guest? This cannot be undone.')) {
        const res = await fetch(`/guests/${id}`, { method: 'DELETE' });
        if (res.ok) loadGuests();
      }
    }

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      const data = { name: form.name.value, phone: form.phone.value };
      try {
        const res = await fetch('/guests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (res.ok) {
          form.reset();
          loadGuests();
        }
      } catch (err) {
        console.error('Failed to add guest:', err);
      }
    });

    loadGuests();
  </script>
</body>
</html>
