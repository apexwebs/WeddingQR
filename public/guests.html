<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-50 to-teal-100 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-4xl font-bold text-teal-700 mb-6">💍 Guest Management</h1>
      <form id="addForm" class="bg-white rounded-lg shadow-md p-6 space-y-4">
        <div class="grid md:grid-cols-2 gap-4">
          <input type="text" name="name" placeholder="Full Name" required class="px-4 py-2 border border-teal-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
          <div class="flex">
            <span class="px-4 py-2 bg-gray-100 border border-teal-300 border-r-0 rounded-l-lg text-gray-600 font-medium">+254</span>
            <input type="tel" name="phone" placeholder="WhatsApp Phone (e.g. 712345678)" required class="flex-1 px-4 py-2 border border-teal-300 rounded-r-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
          </div>
        </div>
        <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-lg transition-colors duration-200">Add Guest</button>
      </form>
    </div>

    <!-- Bulk Actions Bar -->
    <div id="bulkActionsBar" class="mb-4 bg-white rounded-lg shadow-md p-4 hidden">
      <div class="flex items-center gap-2">
        <span id="selectedCount" class="text-gray-700 font-semibold">0 selected</span>
        <button id="bulkResetBtn" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 text-white rounded-lg text-sm font-semibold transition-colors">Reset Selected</button>
        <button id="bulkDeleteBtn" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-semibold transition-colors">Delete Selected</button>
        <button id="clearSelectionBtn" class="px-4 py-2 bg-gray-400 hover:bg-gray-500 text-white rounded-lg text-sm font-semibold transition-colors">Clear Selection</button>
      </div>
    </div>

    <div class="bg-white rounded-lg shadow-md overflow-hidden">
      <table id="guestTable" class="w-full">
        <thead class="bg-teal-600 text-white">
          <tr>
            <th class="px-4 py-3 text-center font-bold"><input type="checkbox" id="selectAll" class="cursor-pointer" /></th>
            <th class="px-6 py-3 text-left font-bold">Name</th>
            <th class="px-6 py-3 text-left font-bold">WhatsApp</th>
            <th class="px-6 py-3 text-left font-bold">Status</th>
            <th class="px-6 py-3 text-center font-bold">Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let allGuests = [];
    let selectedGuests = new Set();

    async function loadGuests() {
      const res = await fetch('/guests');
      allGuests = await res.json();
      renderTable();
    }

    function renderTable() {
      const tbody = document.querySelector('#guestTable tbody');
      tbody.innerHTML = '';
      allGuests.forEach((g) => {
        const tr = document.createElement('tr');
        tr.className = selectedGuests.has(g.id) ? 'bg-blue-50' : 'bg-white hover:bg-teal-50';
        const status = g.checkedIn ? 'bg-teal-100 text-teal-800' : 'bg-gray-100 text-gray-800';
        const statusText = g.checkedIn ? '✓ Checked In' : 'Pending';
        
        tr.innerHTML = `
          <td class="px-4 py-4 text-center">
            <input type="checkbox" class="guest-checkbox cursor-pointer" data-id="${g.id}" ${selectedGuests.has(g.id) ? 'checked' : ''} />
          </td>
          <td class="px-6 py-4 text-gray-800 font-medium">${g.name}</td>
          <td class="px-6 py-4 text-gray-600">+254${g.phone || '-'}</td>
          <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-sm font-semibold ${status}">${statusText}</span></td>
          <td class="px-6 py-4 text-center space-x-1">
            <a href="/guests/${g.id}/qr" target="_blank" class="inline-block bg-teal-500 hover:bg-teal-600 text-white px-3 py-1 rounded text-xs font-semibold transition-colors">QR</a>
            <button class="send-whatsapp-btn bg-green-500 hover:bg-green-600 text-white px-3 py-1 rounded text-xs font-semibold transition-colors" data-id="${g.id}">📱 Send</button>
            <button class="reset-status-btn bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-xs font-semibold transition-colors" data-id="${g.id}">↻ Reset</button>
            <button class="delete-btn bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded text-xs font-semibold transition-colors" data-id="${g.id}">🗑 Delete</button>
          </td>
        `;
        tbody.appendChild(tr);

        // attach event listeners to buttons
        tr.querySelector('.send-whatsapp-btn').addEventListener('click', () => sendWhatsApp(g.id, g.name, g.phone));
        tr.querySelector('.reset-status-btn').addEventListener('click', () => resetStatus(g.id));
        tr.querySelector('.delete-btn').addEventListener('click', () => deleteGuest(g.id));
        tr.querySelector('.guest-checkbox').addEventListener('change', (e) => {
          if (e.target.checked) {
            selectedGuests.add(g.id);
          } else {
            selectedGuests.delete(g.id);
          }
          updateBulkUI();
        });
      });
      updateBulkUI();
    }

    function updateBulkUI() {
      const bulkBar = document.getElementById('bulkActionsBar');
      const selectedCount = document.getElementById('selectedCount');
      const selectAllCheckbox = document.getElementById('selectAll');

      if (selectedGuests.size > 0) {
        bulkBar.classList.remove('hidden');
        selectedCount.textContent = `${selectedGuests.size} selected`;
      } else {
        bulkBar.classList.add('hidden');
      }

      selectAllCheckbox.checked = selectedGuests.size === allGuests.length && allGuests.length > 0;
    }

    // select all checkbox
    document.getElementById('selectAll').addEventListener('change', (e) => {
      if (e.target.checked) {
        allGuests.forEach(g => selectedGuests.add(g.id));
      } else {
        selectedGuests.clear();
      }
      renderTable();
    });

    // bulk actions
    document.getElementById('bulkResetBtn').addEventListener('click', async () => {
      if (confirm(`Reset status for ${selectedGuests.size} guest(s)?`)) {
        for (const id of selectedGuests) {
          await fetch(`/guests/${id}/reset`, { method: 'POST' });
        }
        selectedGuests.clear();
        loadGuests();
      }
    });

    document.getElementById('bulkDeleteBtn').addEventListener('click', async () => {
      if (confirm(`Delete ${selectedGuests.size} guest(s)? This cannot be undone.`)) {
        for (const id of selectedGuests) {
          await fetch(`/guests/${id}`, { method: 'DELETE' });
        }
        selectedGuests.clear();
        loadGuests();
      }
    });

    document.getElementById('clearSelectionBtn').addEventListener('click', () => {
      selectedGuests.clear();
      renderTable();
    });

    // individual actions
    async function sendWhatsApp(id, name, phone) {
      const url = await fetch(`/guests/${id}/qr-url`).then(r => r.json()).then(d => d.url);
      const message = encodeURIComponent(`Hi ${name}! 👋 Here is your wedding check-in QR code:\n${url}`);
      const whatsappUrl = `https://wa.me/254${phone}?text=${message}`;
      window.open(whatsappUrl, '_blank');
    }

    async function resetStatus(id) {
      if (confirm('Reset this guest\'s check-in status?')) {
        const res = await fetch(`/guests/${id}/reset`, { method: 'POST' });
        if (res.ok) {
          loadGuests();
        }
      }
    }

    async function deleteGuest(id) {
      if (confirm('Delete this guest? This cannot be undone.')) {
        const res = await fetch(`/guests/${id}`, { method: 'DELETE' });
        if (res.ok) {
          loadGuests();
        }
      }
    }

    document.getElementById('addForm').addEventListener('submit', async e => {
      e.preventDefault();
      const form = e.target;
      const data = { name: form.name.value, phone: form.phone.value };
      const res = await fetch('/guests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
      if (res.ok) {
        const json = await res.json();
        console.log('Guest added with QR:', json.qr);
        console.log('Check-in URL:', json.url);
        form.reset();
        loadGuests();
        alert('✓ Guest added successfully!');
      } else {
        alert('❌ Failed to add guest. Check the console for details.');
      }
    });

    loadGuests();
  </script>
</body>
</html>
