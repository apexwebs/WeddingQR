<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guest Management</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-50 to-teal-100 min-h-screen">
  <div class="max-w-6xl mx-auto px-4 py-8">
    <div class="mb-8">
      <h1 class="text-4xl font-bold text-teal-700 mb-6">Guest Management</h1>
      <form id="addForm" class="bg-white rounded-lg shadow-md p-6 space-y-4">
        <div class="grid md:grid-cols-2 gap-4">
          <input type="text" name="name" placeholder="Guest Name" required class="px-4 py-2 border border-teal-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
          <input type="email" name="email" placeholder="Email (optional)" class="px-4 py-2 border border-teal-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-teal-500" />
        </div>
        <button class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2 px-4 rounded-lg transition-colors duration-200">Add Guest</button>
      </form>
    </div>
    <div class="bg-white rounded-lg shadow-md overflow-hidden">
      <table id="guestTable" class="w-full">
        <thead class="bg-teal-600 text-white">
          <tr>
            <th class="px-6 py-3 text-left font-bold">Name</th>
            <th class="px-6 py-3 text-left font-bold">Email</th>
            <th class="px-6 py-3 text-left font-bold">Status</th>
            <th class="px-6 py-3 text-center font-bold">QR Code</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
  <script>
    async function loadGuests(){
      const res = await fetch('/guests');
      const guests = await res.json();
      const tbody = document.querySelector('#guestTable tbody');
      tbody.innerHTML = '';
      guests.forEach((g, i)=>{
        const tr = document.createElement('tr');
        tr.className = i % 2 === 0 ? 'bg-white hover:bg-teal-50' : 'bg-teal-50 hover:bg-teal-100';
        const status = g.checkedIn ? 'bg-teal-100 text-teal-800' : 'bg-gray-100 text-gray-800';
        const statusText = g.checkedIn ? '✓ Checked In' : 'Pending';
        tr.innerHTML = `
          <td class="px-6 py-4 text-gray-800 font-medium">${g.name}</td>
          <td class="px-6 py-4 text-gray-600">${g.email || '-'}</td>
          <td class="px-6 py-4"><span class="px-3 py-1 rounded-full text-sm font-semibold ${status}">${statusText}</span></td>
          <td class="px-6 py-4 text-center"><a href="/guests/${g.id}/qr" target="_blank" class="inline-block bg-teal-500 hover:bg-teal-600 text-white px-4 py-2 rounded-lg text-sm font-semibold transition-colors">View QR</a></td>
        `;
        tbody.appendChild(tr);
      });
    }
    document.getElementById('addForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const form = e.target;
      const data = { name: form.name.value, email: form.email.value };
      const res = await fetch('/guests', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)});
      const json = await res.json();
      console.log('Guest added with QR:', json.qr);
      form.reset();
      loadGuests();
      alert('✓ Guest added successfully!');
    });
    loadGuests();
  </script>
</body>
</html>
